<body style="background: linear-gradient(135deg, #8ee491 0%, #6ed47f 100%); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; margin: 0;">

    <div class="content-section">
      <p class="title">Save Chennai's Lifeline Pallikaranai Wetland - சென்னையின் உயிர்நாடி பள்ளிக்கரணை சதுப்புநிலத்தை காப்போம்</p>
      <p class="subtitle">(உங்கள் செல்பேசி மூலம் - கீழே உள்ள கட்டத்தில் பெயர் மற்றும் ஊரை குறிப்பிட்டு "Send Mail" பொத்தானை அழுத்தினால் கடிதம் சென்றுவிடும்.)</p>
      
      <div class="form-group">
        <label for="name">பெயர்:</label>
        <input type="text" id="name" placeholder="உங்கள் பெயரை உள்ளிடவும்" />
      </div>

      <div class="form-group">
        <label for="place">ஊர்:</label>
        <input type="text" id="place" placeholder="உங்கள் ஊர்/நகரத்தை உள்ளிடவும்" />
      </div>

      <div class="button-container">
        <button class="send-button" onclick="mailFunction1();"><b>Send Mail</b></button>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script>

    function mailFunction1() {
      Name = $('#name').val();
      Place = $('#place').val();
      var emailBody = "பெறுதல்%0D%0A %0D%0A1. மாண்புமிகு தமிழ்நாடு முதலமைச்சர் அவர்கள்%0D%0A %0D%0A2. மாண்புமிகு நீர்வளங்கள் துறை அமைச்சர் அவர்கள்%0D%0A %0D%0A3. மாண்புமிகு வனத்துறை அமைச்சர் அவர்கள் (தலைவர், தமிழ்நாடு மாநில ஈரநிலங்கள் ஆணையம் – TNSWA)%0D%0A %0D%0A4. மாண்புமிகு சுற்றுச்சூழல்துறை அமைச்சர் அவர்கள்%0D%0A %0D%0A5. உயர்திரு தலைமைச் செயலாளர் அவர்கள் (துணைத் தலைவர், தமிழ்நாடு ஈரநிலங்கள் ஆணையம் - TNSWA)%0D%0A %0D%0A6. உயர்திரு வனத்துறை செயலாளர் அவர்கள் (உறுப்பினர், தமிழ்நாடு ஈரநிலங்கள் ஆணையம் - TNSWA)%0D%0A %0D%0A7. முதன்மை தலைமை வனப்பாதுகாவலர், (உறுப்பினர் செயலர், தமிழ்நாடு ஈரநிலங்கள் ஆணையம் - TNSWA)%0D%0A %0D%0A8. மாவட்ட ஆட்சியர், செங்கல்பட்டு மாவட்டம் (Chairperson, Chengalpattu District Level Wetland Management Committee)%0D%0A %0D%0A9. மாவட்ட ஆட்சியர், சென்னை மாவட்டம் (Chairperson, Chennai District Level Wetland Management Committee)%0D%0A %0D%0A10. தமிழ்நாடு ஈரநிலங்கள் இயக்கம் (TNWM)%0D%0A %0D%0A11. தமிழ்நாடு உயிரிப்பல்வகைமை வாரியம் (TNBB)%0D%0A %0D%0A12. தமிழ்நாடு பசுமை இயக்கம்%0D%0A %0D%0A13. தமிழ்நாடு பசுமை காலநிலை நிறுவனம் (TNGCC)%0D%0A %0D%0A14. தமிழ்நாடு மாநில கடலோர மண்டல மேலாண்மைக் குழுமம் (TNSCZMA)%0D%0A %0D%0A15. தமிழ்நாடு மாசுக்கட்டுப்பாடு வாரியம் (TNPCB)%0D%0A %0D%0A16. சென்னை பெருநகர வளர்ச்சிக் குழுமம் (CMDA)%0D%0A %0D%0Aஅன்புடையீர்! வணக்கம்.%0D%0A %0D%0APபொருள்: பள்ளிக்கரணை சதுப்புநிலத்தை Wetlands (Conservation and Management) Rules, 2017 விதிகளின் கீழ் அறிவிக்கை (Notification) செய்ய வேண்டும் - என்பது தொடர்பாக…%0D%0A %0D%0Aசென்னையின் வெள்ளத்தை சமாளிக்கவும், நிலத்தடி நீர்வளத்தை அதிகரிக்கவும், மாசுபாட்டை கட்டுப்படுத்தவும் பள்ளிக்கரணை சதுப்புநிலம் பயன்படுகிறது. சென்னை பெருநகரின் உயிர்நாடியான பள்ளிக்கரணை சதுப்புநிலம் ஒரு காலத்தில் 5,500 எக்டேர் பரப்பளவில் இருந்தது. கடந்த 60 ஆண்டுகளில் கண்மூடித்தனமாக அழிக்கப்பட்டது. பசுமைத் தாயகம் உள்ளிட்ட சூழலியல் அமைப்புகளின் தொடர் போராட்டத்திற்கு பிறகு 2007ஆம் ஆண்டில் 698 எக்டேர் சதுப்புநிலம் பாதுகாக்கப்பட்ட வனப்பகுதியாக அறிவிக்கப்பட்டது. பின்னர் 2022ஆம் ஆண்டில் 1248 எக்டேர் பரப்பானது சர்வதேச அளவில் முக்கியத்துவம் வாய்ந்ததாக ராம்சார் சதுப்புநிலமாக அறிவிக்கப்பட்டது.%0D%0A %0D%0Aஆனால், பள்ளிக்கரணை சதுப்புநிலம் 2022ஆம் ஆண்டில் ராம்சார் பட்டியலில் சேர்க்கப்பட்டாலும், இன்றுவரை அதனை சட்டப்படியான சதுப்புநிலமாக, இந்திய அரசின் சதுப்புநிலங்கள் (பாதுகாப்பு மற்றும் மேலாண்மை) விதிகள் 2017 (The Wetlands (Conservation and Management) Rules, 2017) இன் கீழ், அறிவிக்கை (Notification) செய்யவில்லை. அதன் எல்லையையும் தாக்கப்பகுதியையும் (delineation of the wetland and their zone of influence) வரையறை செய்யவே இல்லை.%0D%0A %0D%0Aஇது தொடர்பாக பின்வரும் கோரிக்கைகளை தமிழ்நாடு அரசுக்கும் தொடர்புடைய துறையினருக்கும் முன்வைக்கிறேன்.%0D%0A %0D%0A1. பள்ளிக்கரணை சதுப்புநிலத்தை Wetlands (Conservation and Management) Rules, 2017 விதிகளின் கீழ் அறிவிக்கை (Notification) செய்ய வேண்டும்.%0D%0A %0D%0Aராம்சார் பட்டியலில் இணைக்கப்பட்டுள்ள பள்ளிக்கரணை சதுப்புநிலத்தின் 1248 ஏக்டேர் பரப்பையும் அதன் தாக்கப்பகுதிகளையும் வரையறை செய்து (delineation of the wetland and their zone of influence.) இந்திய அரசின் சதுப்புநிலங்கள் (பாதுகாப்பு மற்றும் மேலாண்மை) விதிகள் 2017 (The Wetlands (Conservation and Management) Rules, 2017) மற்றும் அதன் வழிகாட்டு நெறிகள் 2020 (Guidelines for Implementing Wetlands (Conservation and Management) Rules-2017) ஆகியவற்றின் கீழ் அறிவிக்கை (notification) வெளியிட வேண்டும்.%0D%0A %0D%0A2. பள்ளிக்கரணை சதுப்புநிலத்துடன் இணைந்த 65 சதுப்புநிலங்களையும் அறிவிக்கை (Notification) செய்ய வேண்டும்.%0D%0A %0D%0Aபள்ளிக்கரணை சதுப்புநிலம் தனித்து இயங்கும் கட்டமைப்பு அல்ல. இது தென் சென்னை பகுதியில் 250 சதுர கிலோ மீட்டர் பரப்பளவில் உள்ள 65 சதுப்புநிலங்களுடன் கூடிய ஒரு சங்கிலித் தொடர் பிணைப்பாக உள்ளது (Pallikaranai Marsh drains an area of 250 km2 of South Chennai encompassing 65 wetlands). இந்த பகுதியின் சதுப்புநிலங்கள் மற்றும் நீர்நிலைகள் அனைத்தையும் 2017 சதுப்புநில விதிகளின் கீழ் பாதுகாக்கவும் மேம்படுத்தவும் வேண்டும். மேலும், சென்னை வடிநிலத்தில் (Chennai Basin) தமிழ்நாட்டிற்குள் உள்ள 6118 சதுர கிலோமீட்டர் பரப்பின் அனைத்து நீர்நிலைகளையும் பாதுகாக்க வேண்டும்.%0D%0A %0D%0A3. சென்னை பெருநகரை ராம்சார் சதுப்புநில மாநகரங்களில் பட்டியலில் (Ramsar Wetland City) சேர்க்க வேண்டும்.%0D%0A %0D%0Aஉலகளவில் 27 நாடுகளை சேர்ந்த 74 நகரங்கள் இந்த பட்டியலில் இடம்பெற்றுள்ளன. இந்தியாவில் இந்தூர், உதய்ப்பூர் ஆகிய நகரங்கள் இப்பட்டியலில் இடம்பெற்றுள்ளன. சென்னை பெருநகரையும் இப்பட்டியலில் சேர்க்க வேண்டும். சென்னை பெருநகரை ராம்சார் சதுப்புநில மாநகரங்கள் பட்டியலில் (Wetland City Accreditation of the Ramsar Convention) இணைப்பதற்காக தமிழ்நாடு அரசு பரிந்துரைக்க வேண்டும்.%0D%0A %0D%0Aமேற்கண்ட நடவடிக்கைகளை உடனடியாக மேற்கொண்டு தமிழ்நாட்டின் சதுப்புநிலங்களை பாதுகாக்க வேண்டும் என வலியுறுத்துகிறேன்.%0D%0A %0D%0Aநன்றி%0D%0A %0D%0Aஇப்படிக்கு%0D%0A %0D%0A";
      //emailBody = encodeURIComponent(emailBody);
      var mailtoLink = 'mailto:tnswa18@gmail.com, cwlw_wildlife3@yahoo.in, cmcell@tn.gov.in, cmo@tn.gov.in, cs@tn.gov.in, memsec@tnpcb.gov.in, minister_finance@tn.gov.in, minister_forests@tn.gov.in, forsec@tn.gov.in, greentamilnadumission@gmail.com, tndoe@tn.nic.in, secy.tnbb@tn.gov.in, cp.tnbb@tn.gov.in, tnclimatechangemission@gmail.com, tamilnadudoe@gmail.com, tnsczma@gmail.com, mscmda@tn.gov.in, mlaperambur@tn.gov.in, mlathiyagarayanagar@tn.gov.in, mlagobichettipalayam@tn.gov.in, mlacuddalore@tn.gov.in, mlakancheepuram@tn.gov.in, mlatiruvadanai@tn.gov.in, collrchn@nic.in, collr-cpt@nic.in, info@pmkofficial.com?cc=commissioner@chennaicorporation.gov.in&subject=Save Chennai\'s Lifeline Pallikaranai Wetland - சென்னையின் உயிர்நாடி பள்ளிக்கரணை சதுப்புநிலத்தை காப்போம்&body=' + emailBody + 'பெயர்: ' + Name + '%0D%0A ஊர்: ' + Place;
      window.location.href = mailtoLink;
      //$('#mail1').attr('href', 'mailto:homesec@tn.gov.in ?cc=info@pasumai.earth&subject=தமிழ்நாட்டில் ஆன்லைன் சூதாட்டத்தை முழுவதுமாக தடை செய்ய வேண்டும். &body='+emailBody+'பெயர்: '+Name+'%0D%0A ஊர்: '+Place);
    }
  </script>
